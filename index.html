<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Rape Culture — SafeBAE Interactive Module</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Fraunces:opsz,wght@9..144,700;9..144,900&display=swap" rel="stylesheet"/>
<style>
:root{
  --mint:#D1FEFF;
  --teal:#13848F;
  --aqua:#15FFC8;
  --deep:#1D414E;
  --bg:#E8FEFF;
  --card:#fff;
  --text:#0a2a2f;
  --muted:#3a6670;
  --coral:#FF6B6B;
  --peach:#FF8A7A;
  --warm-red:#E85454;
  --green-soft:#A8E6CF;
  --yellow-soft:#FFE29A;
  --teal-soft:#B2EBF2;
  --radius:20px;
  --shadow:0 8px 32px rgba(19,132,143,.12);
  --font-body:'Outfit',sans-serif;
  --font-display:'Fraunces',serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.app{
  max-width:680px;
  margin:0 auto;
  padding:20px 16px 80px;
}
/* ===== TOP BAR ===== */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 0;margin-bottom:8px;
}
.logo{font-family:var(--font-display);font-weight:900;font-size:18px;color:var(--teal);letter-spacing:-.3px;}
.logo span{background:var(--teal);color:#fff;padding:2px 8px;border-radius:6px;font-size:14px;margin-left:4px;}
.cw-banner{
  background:linear-gradient(135deg,rgba(255,107,107,.08),rgba(255,138,122,.06));
  border:1px solid rgba(255,107,107,.22);border-radius:14px;padding:12px 16px;
  font-size:13px;color:#8a3030;margin-bottom:20px;line-height:1.5;
}
.cw-banner b{color:#c0392b;}
/* ===== PROGRESS ===== */
.progress-wrap{
  position:sticky;top:0;z-index:100;background:rgba(232,254,255,.92);
  backdrop-filter:blur(12px);padding:10px 0 6px;margin-bottom:12px;
}
.progress-bar{display:flex;gap:4px;height:5px;}
.progress-seg{flex:1;border-radius:99px;background:rgba(19,132,143,.12);transition:background .4s,box-shadow .4s;}
.progress-seg.done{background:var(--teal);box-shadow:0 0 6px rgba(19,132,143,.3);}
.progress-seg.active{background:var(--aqua);box-shadow:0 0 8px rgba(21,255,200,.4);}
.progress-label{font-size:11px;color:var(--muted);font-weight:700;margin-top:4px;text-align:center;letter-spacing:.3px;}
/* ===== CARDS ===== */
.card{
  background:var(--card);border:1px solid rgba(19,132,143,.10);
  border-radius:var(--radius);box-shadow:var(--shadow);padding:28px 24px;
  margin-bottom:16px;animation:slideUp .4s ease both;
}
@keyframes slideUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.card-header{margin-bottom:16px;}
.card-eyebrow{
  font-size:11px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--teal);margin-bottom:6px;
}
.card-title{
  font-family:var(--font-display);font-weight:900;font-size:26px;line-height:1.15;
  color:var(--text);letter-spacing:-.3px;
}
.card-title .highlight{
  background:linear-gradient(180deg,transparent 55%,rgba(21,255,200,.35) 55%);
  padding:0 4px;
}
.card p,.card .body-text{font-size:15px;color:var(--muted);line-height:1.65;margin-bottom:12px;}
.card p:last-child{margin-bottom:0;}
.card p b,.card .body-text b{color:var(--text);}
/* ===== NOTE BOX ===== */
.note-box{
  border-left:4px solid var(--teal);background:rgba(19,132,143,.06);
  border-radius:0 14px 14px 0;padding:14px 16px;margin:14px 0;
  font-size:14px;color:var(--text);line-height:1.55;
}
.note-box.warn{border-color:var(--coral);background:rgba(255,107,107,.06);}
.note-box b{color:var(--teal);}
.note-box.warn b{color:var(--warm-red);}
/* ===== TAG CLOUD ===== */
.tag-cloud{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0;}
.tag{
  display:inline-block;padding:8px 16px;border-radius:99px;font-size:13px;font-weight:700;
  cursor:default;transition:transform .15s,box-shadow .15s;
}
.tag:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.08);}
.tag.coral{background:rgba(255,107,107,.12);border:1px solid rgba(255,107,107,.30);color:#a83232;}
.tag.teal{background:rgba(19,132,143,.10);border:1px solid rgba(19,132,143,.25);color:var(--teal);}
.tag.peach{background:rgba(255,138,122,.12);border:1px solid rgba(255,138,122,.30);color:#8a3a2a;}
/* ===== NUMBERED LIST ===== */
.num-list{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
.num-item{
  display:flex;align-items:flex-start;gap:14px;padding:14px 16px;
  border-radius:16px;background:rgba(19,132,143,.04);
  border:1px solid rgba(19,132,143,.08);
}
.num-badge{
  min-width:32px;height:32px;border-radius:50%;
  background:var(--teal);color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:900;flex-shrink:0;
}
.num-text{font-size:14px;color:var(--muted);line-height:1.55;}
.num-text b{color:var(--text);}
/* ===== ELEMENTS GRID ===== */
.elem-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0;}
@media(max-width:500px){.elem-grid{grid-template-columns:1fr;}}
.elem-btn{
  appearance:none;border:1.5px solid rgba(19,132,143,.15);
  background:var(--card);border-radius:16px;padding:16px 14px;
  cursor:pointer;text-align:left;transition:all .18s;font-family:inherit;
}
.elem-btn:hover,.elem-btn.open{
  border-color:var(--teal);background:rgba(19,132,143,.05);
  box-shadow:0 4px 16px rgba(19,132,143,.10);transform:translateY(-2px);
}
.elem-icon{font-size:24px;margin-bottom:6px;}
.elem-title{font-size:14px;font-weight:800;color:var(--text);margin-bottom:2px;}
.elem-body{
  font-size:12.5px;color:var(--muted);line-height:1.45;max-height:0;
  overflow:hidden;transition:max-height .3s ease,margin .3s ease;
}
.elem-btn.open .elem-body{max-height:120px;margin-top:8px;}
/* ===== MYTH CARDS ===== */
.myth-stack{display:flex;flex-direction:column;gap:10px;margin:14px 0;}
.myth-card{
  border-radius:16px;border:1.5px solid rgba(19,132,143,.12);
  background:var(--card);overflow:hidden;cursor:pointer;
  transition:border-color .2s,box-shadow .2s;
}
.myth-card:hover,.myth-card.open{border-color:var(--teal);box-shadow:0 4px 16px rgba(19,132,143,.10);}
.myth-head{
  display:flex;align-items:center;gap:12px;padding:14px 16px;font-weight:800;font-size:14px;
}
.myth-x{
  min-width:28px;height:28px;border-radius:50%;background:var(--coral);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;flex-shrink:0;
}
.myth-chev{margin-left:auto;font-size:12px;color:var(--muted);transition:transform .2s;}
.myth-card.open .myth-chev{transform:rotate(180deg);}
.myth-body{
  max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;
  padding:0 16px;font-size:13.5px;color:var(--muted);line-height:1.55;
}
.myth-card.open .myth-body{max-height:200px;padding:0 16px 16px;}
.myth-fact{
  display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:12px;
  background:rgba(19,132,143,.06);margin-top:8px;
}
.myth-check{
  min-width:28px;height:28px;border-radius:50%;background:var(--teal);
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:900;flex-shrink:0;
}
/* ===== REFLECT PROMPTS ===== */
.reflect-grid{display:flex;flex-direction:column;gap:8px;margin:14px 0;}
.reflect-item{
  padding:14px 16px;border-radius:14px;
  background:rgba(19,132,143,.04);border:1px solid rgba(19,132,143,.10);
  font-size:14px;color:var(--text);line-height:1.5;
  display:flex;align-items:flex-start;gap:10px;
}
.reflect-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
/* ===== ACCORDION ===== */
.accord-stack{display:flex;flex-direction:column;gap:6px;margin:14px 0;}
.accord-item{
  border-radius:14px;border:1px solid rgba(19,132,143,.12);
  background:var(--card);overflow:hidden;
}
.accord-head{
  width:100%;appearance:none;background:transparent;border:none;
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  cursor:pointer;font-family:inherit;font-weight:800;font-size:14px;
  color:var(--text);text-align:left;transition:background .12s;
}
.accord-head:hover{background:rgba(19,132,143,.04);}
.accord-head.open{background:rgba(19,132,143,.06);}
.accord-emoji{font-size:18px;flex-shrink:0;}
.accord-title{flex:1;}
.accord-chev{flex-shrink:0;transition:transform .2s;opacity:.5;font-size:12px;}
.accord-head.open .accord-chev{transform:rotate(180deg);}
.accord-body{
  max-height:0;overflow:hidden;font-size:13.5px;color:var(--muted);
  line-height:1.55;transition:max-height .3s ease,padding .3s ease;padding:0 16px;
}
.accord-body.open{max-height:200px;padding:0 16px 14px 44px;}
/* ===== IMAGE ===== */
.img-frame{
  border-radius:16px;overflow:hidden;border:1px solid rgba(19,132,143,.10);
  margin:14px 0;box-shadow:0 4px 20px rgba(0,0,0,.06);
}
.img-frame img{width:100%;display:block;}
.img-caption{
  padding:10px 14px;font-size:12px;color:var(--muted);
  background:rgba(19,132,143,.03);line-height:1.45;font-style:italic;
}
/* ===== VIDEO ===== */
.video-wrap{
  border-radius:16px;overflow:hidden;margin:14px 0;
  box-shadow:0 4px 20px rgba(0,0,0,.08);aspect-ratio:16/9;
}
.video-wrap iframe{width:100%;height:100%;border:none;}
/* ===== QUIZ ===== */
.quiz-q{
  font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px;line-height:1.4;
}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{
  appearance:none;border:1.5px solid rgba(19,132,143,.15);
  background:var(--card);border-radius:14px;padding:13px 16px;
  cursor:pointer;text-align:left;font-family:inherit;font-size:14px;
  font-weight:600;color:var(--text);transition:all .15s;
}
.quiz-opt:hover:not(:disabled){
  border-color:var(--teal);background:rgba(19,132,143,.04);
}
.quiz-opt:disabled{cursor:default;opacity:.85;}
.quiz-opt.correct{
  background:rgba(19,132,143,.10)!important;border-color:var(--teal)!important;color:var(--teal)!important;
}
.quiz-opt.wrong{
  background:rgba(255,107,107,.08)!important;border-color:var(--coral)!important;color:var(--coral)!important;
}
.quiz-feedback{
  margin-top:10px;padding:12px 14px;border-radius:12px;font-size:13.5px;line-height:1.5;
}
.quiz-feedback.right{background:rgba(19,132,143,.08);color:var(--teal);border:1px solid rgba(19,132,143,.18);}
.quiz-feedback.wrong{background:rgba(255,107,107,.08);color:#8a3030;border:1px solid rgba(255,107,107,.18);}
/* ===== BUTTONS ===== */
.btn{
  appearance:none;border:none;border-radius:14px;padding:14px 20px;
  font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;
  transition:all .15s;width:100%;text-align:center;
}
.btn:active{transform:translateY(1px);}
.btn-primary{
  background:linear-gradient(135deg,var(--teal),#0e6b75);color:#fff;
  box-shadow:0 4px 16px rgba(19,132,143,.25);
}
.btn-primary:hover{box-shadow:0 6px 24px rgba(19,132,143,.35);transform:translateY(-1px);}
.btn-secondary{
  background:rgba(19,132,143,.08);color:var(--teal);
  border:1.5px solid rgba(19,132,143,.20);
}
.btn-secondary:hover{background:rgba(19,132,143,.14);}
.btn-row{display:flex;gap:10px;margin-top:16px;}
.btn-row .btn{flex:1;}
/* ===== PEER INFLUENCE CARDS ===== */
.peer-stack{display:flex;flex-direction:column;gap:12px;margin:14px 0;}
.peer-card{
  border-radius:16px;padding:18px;position:relative;overflow:hidden;
}
.peer-card::before{
  content:'';position:absolute;inset:0;opacity:.08;border-radius:16px;
}
.peer-card.red{background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.18);}
.peer-card.green{background:rgba(168,230,207,.15);border:1px solid rgba(168,230,207,.35);}
.peer-card.blue{background:rgba(19,132,143,.06);border:1px solid rgba(19,132,143,.15);}
.peer-label{font-size:13px;font-weight:900;margin-bottom:6px;letter-spacing:.3px;}
.peer-card.red .peer-label{color:var(--coral);}
.peer-card.green .peer-label{color:#2d8659;}
.peer-card.blue .peer-label{color:var(--teal);}
.peer-text{font-size:14px;color:var(--muted);line-height:1.55;}
/* ===== GENDER DIAGRAM ===== */
.gender-diagram{
  display:grid;grid-template-columns:1fr auto 1fr;gap:10px;
  align-items:center;margin:14px 0;
}
.gender-box{
  border-radius:14px;padding:14px;text-align:center;
}
.gender-box.left{background:rgba(19,132,143,.06);border:1px solid rgba(19,132,143,.12);}
.gender-box.right{background:rgba(255,107,107,.06);border:1px solid rgba(255,107,107,.15);}
.gender-box .gb-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.gender-box.left .gb-label{color:var(--teal);}
.gender-box.right .gb-label{color:var(--coral);}
.gender-box .gb-items{font-size:12px;color:var(--muted);line-height:1.6;}
.gender-plus{font-size:22px;font-weight:900;color:var(--teal);}
.gender-equals{
  grid-column:1/-1;text-align:center;padding:10px;
  border-radius:12px;background:rgba(19,132,143,.08);
  font-size:13px;font-weight:800;color:var(--teal);
}
/* ===== JOURNEY MAP ===== */
.journey-wrap{
  position:relative;padding:20px 0 10px;margin:14px 0;overflow:hidden;
}
.journey-svg{
  position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:100%;height:100%;pointer-events:none;z-index:0;
}
.journey-path{
  fill:none;stroke:var(--teal);stroke-width:3;stroke-dasharray:8 6;
  stroke-linecap:round;opacity:.35;
}
.journey-path-glow{
  fill:none;stroke:var(--aqua);stroke-width:3;stroke-dasharray:8 6;
  stroke-linecap:round;
  stroke-dashoffset:1200;
  animation:drawPath 4s ease-out forwards;
}
@keyframes drawPath{to{stroke-dashoffset:0;}}
.journey-stops{
  position:relative;z-index:1;display:flex;flex-direction:column;gap:0;
}
.journey-stop{
  display:flex;align-items:center;gap:14px;
  padding:8px 12px;cursor:pointer;
  transition:all .25s ease;position:relative;
}
.journey-stop:nth-child(odd){flex-direction:row;padding-left:8%;}
.journey-stop:nth-child(even){flex-direction:row-reverse;padding-right:8%;text-align:right;}
.journey-pin{
  position:relative;min-width:36px;height:36px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.journey-pin-dot{
  width:14px;height:14px;border-radius:50%;
  transition:all .3s ease;box-shadow:0 0 0 0 transparent;
}
.journey-pin-ring{
  position:absolute;inset:-4px;border-radius:50%;
  border:2px solid transparent;transition:all .3s ease;
}
.journey-stop:hover .journey-pin-ring,
.journey-stop.active .journey-pin-ring{
  border-color:var(--teal);animation:pingRing 1.2s ease-out;
}
@keyframes pingRing{
  0%{transform:scale(.7);opacity:1;}
  100%{transform:scale(1.6);opacity:0;}
}
.journey-stop:hover .journey-pin-dot,
.journey-stop.active .journey-pin-dot{
  transform:scale(1.3);
  box-shadow:0 0 12px rgba(19,132,143,.4);
}
.journey-label{
  font-size:13px;font-weight:700;color:var(--text);
  padding:6px 14px;border-radius:12px;
  background:rgba(255,255,255,.85);backdrop-filter:blur(6px);
  border:1px solid rgba(19,132,143,.10);
  transition:all .25s ease;line-height:1.35;
  max-width:220px;
}
.journey-stop:hover .journey-label,
.journey-stop.active .journey-label{
  background:var(--card);
  border-color:var(--teal);
  box-shadow:0 4px 16px rgba(19,132,143,.12);
  transform:scale(1.04);
}
.journey-label .jl-sub{
  font-size:11px;font-weight:500;color:var(--muted);
  max-height:0;overflow:hidden;transition:max-height .3s ease,margin .3s ease;
  line-height:1.4;
}
.journey-stop.active .journey-label .jl-sub{
  max-height:80px;margin-top:4px;
}
/* Pin color classes */
.pin-coral .journey-pin-dot{background:var(--coral);}
.pin-teal .journey-pin-dot{background:var(--teal);}
.pin-peach .journey-pin-dot{background:var(--peach);}
.pin-green .journey-pin-dot{background:var(--green-soft);}
.pin-yellow .journey-pin-dot{background:var(--yellow-soft);}
.pin-deep .journey-pin-dot{background:var(--deep);}
/* Staggered entrance */
.journey-stop{opacity:0;transform:translateY(12px);animation:stopReveal .4s ease-out forwards;}
.journey-stop:nth-child(1){animation-delay:.15s}
.journey-stop:nth-child(2){animation-delay:.3s}
.journey-stop:nth-child(3){animation-delay:.45s}
.journey-stop:nth-child(4){animation-delay:.6s}
.journey-stop:nth-child(5){animation-delay:.75s}
.journey-stop:nth-child(6){animation-delay:.9s}
.journey-stop:nth-child(7){animation-delay:1.05s}
.journey-stop:nth-child(8){animation-delay:1.2s}
.journey-stop:nth-child(9){animation-delay:1.35s}
.journey-stop:nth-child(10){animation-delay:1.5s}
.journey-stop:nth-child(11){animation-delay:1.65s}
.journey-stop:nth-child(12){animation-delay:1.8s}
.journey-stop:nth-child(13){animation-delay:1.95s}
.journey-stop:nth-child(14){animation-delay:2.1s}
@keyframes stopReveal{to{opacity:1;transform:translateY(0);}}
/* Start / End markers */
.journey-marker{
  text-align:center;padding:10px;font-family:var(--font-display);
  font-weight:900;font-size:15px;letter-spacing:-.2px;position:relative;z-index:1;
}
.journey-marker.start{color:var(--teal);}
.journey-marker.end{color:var(--coral);}
.journey-marker .marker-icon{font-size:28px;display:block;margin-bottom:2px;}
.journey-connector{
  height:24px;position:relative;z-index:0;
  display:flex;align-items:center;justify-content:center;
}
.journey-connector::before{
  content:'';width:3px;height:100%;
  background:repeating-linear-gradient(180deg,var(--teal) 0 4px,transparent 4px 8px);
  opacity:.25;border-radius:2px;
}
/* ===== HIDDEN ===== */
.screen{display:none;}
.screen.active{display:block;}
/* ===== FOOTER ===== */
.footer{
  text-align:center;padding:20px 0;font-size:12px;color:var(--muted);
  border-top:1px solid rgba(19,132,143,.08);margin-top:24px;
}
.footer a{color:var(--teal);text-decoration:none;font-weight:700;}
.footer a:hover{text-decoration:underline;}
/* ===== RESOURCES ===== */
.resource-list{display:flex;flex-direction:column;gap:8px;margin:14px 0;}
.resource-link{
  display:flex;align-items:center;gap:14px;padding:14px 16px;
  border-radius:14px;border:1px solid rgba(19,132,143,.10);
  background:var(--card);text-decoration:none;color:var(--text);
  transition:all .15s;
}
.resource-link:hover{
  border-color:var(--teal);background:rgba(19,132,143,.04);
  box-shadow:0 4px 12px rgba(19,132,143,.08);transform:translateY(-1px);
}
.resource-icon{font-size:22px;flex-shrink:0;}
.resource-name{font-weight:800;font-size:14px;margin-bottom:2px;}
.resource-desc{font-size:12px;color:var(--muted);line-height:1.35;}
/* ===== SARAH SECTION ===== */
.sarah-layout{
  display:flex;gap:16px;align-items:flex-start;margin:14px 0;
}
@media(max-width:500px){.sarah-layout{flex-direction:column;}}
.sarah-img{
  width:160px;min-width:160px;border-radius:14px;overflow:hidden;
  border:1px solid rgba(19,132,143,.10);box-shadow:0 4px 16px rgba(0,0,0,.06);
}
.sarah-img img{width:100%;display:block;}
.sarah-text{flex:1;}
/* ===== COMPLETION ===== */
.completion-badge{
  text-align:center;padding:24px;margin:14px 0;
  border-radius:20px;background:linear-gradient(135deg,rgba(19,132,143,.08),rgba(21,255,200,.06));

function renderProgress(){
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  bar.innerHTML = STEPS.map((_,i)=>{
    let cls = 'progress-seg';
    if(i < currentStep) cls += ' done';
    else if(i === currentStep) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  label.textContent = `${currentStep+1} of ${STEPS.length}: ${STEPS[currentStep].label}`;
}

// ===== HELPERS =====
function buildAccord(idx, emoji, title, body){
  return `<div class="accord-item">
    <button class="accord-head" onclick="toggleAccord(this)">
      <span class="accord-emoji">${emoji}</span>
      <span class="accord-title">${title}</span>
      <span class="accord-chev">▼</span>
    </button>
    <div class="accord-body">${body}</div>
  </div>`;
}

function toggleAccord(btn){
  const wasOpen = btn.classList.contains('open');
  // close all in same stack
  const stack = btn.closest('.accord-stack');
  stack.querySelectorAll('.accord-head').forEach(h=>h.classList.remove('open'));
  stack.querySelectorAll('.accord-body').forEach(b=>b.classList.remove('open'));
  if(!wasOpen){
    btn.classList.add('open');
    btn.nextElementSibling.classList.add('open');
  }
}

function toggleElem(i){elemOpen[i]=!elemOpen[i];render();}
function toggleMyth(i){mythOpen[i]=!mythOpen[i];render();}
function toggleJourneyStop(el){
  const wasActive = el.classList.contains('active');
  el.closest('.journey-stops').querySelectorAll('.journey-stop').forEach(s=>s.classList.remove('active'));
  if(!wasActive) el.classList.add('active');
}

function goNext(){
  if(currentStep < STEPS.length-1){currentStep++;render();}
}
function goBack(){
  if(currentStep > 0){currentStep--;render();}
}
function answerQuiz(i){quizAnswers[quizIdx]=i;render();}
function nextQuizQ(){quizIdx=Math.min(RC_QUIZ.length-1,quizIdx+1);render();}
function prevQuizQ(){quizIdx=Math.max(0,quizIdx-1);render();}

// ===== INIT =====
